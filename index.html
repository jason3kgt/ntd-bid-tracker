<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTD Bid Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NTD Bids">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#1B3A6B">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#f7f7f5;
    --surface:#ffffff;
    --surface2:#f0efed;
    --border:#e2e0dc;
    --border2:#ccc9c4;
    --text:#1a1a1a;
    --text2:#666460;
    --text3:#999692;
    --accent:#1a1a1a;
    --red:#d04040;
    --amber:#c07820;
    --green:#3a7d44;
    --blue:#2060a8;
    --hot-bg:#fff3e0;
    --hot-text:#8a4800;
    --warm-bg:#e8f0fb;
    --warm-text:#1a4080;
    --cold-bg:#f0efed;
    --cold-text:#555250;
    --radius:10px;
    --radius-sm:7px;
    --shadow:0 1px 3px rgba(0,0,0,.08);
  }
  html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;font-size:15px;color:var(--text);overscroll-behavior:none}
  /* Layout */
  #app{display:flex;flex-direction:column;height:100%;max-width:680px;margin:0 auto}
  #header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;position:sticky;top:0;z-index:50}
  #header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  #header h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
  #header h1 span{color:var(--text3);font-weight:400}
  #nav{display:flex;gap:0}
  .nav-btn{flex:1;padding:10px 4px 9px;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.01em}
  .nav-btn.active{color:var(--text);border-bottom-color:var(--text)}
  #content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .stat-val{font-size:24px;font-weight:600;letter-spacing:-.5px}
  .stat-val.alert{color:var(--red)}
  /* Kanban */
  .stage-section{margin-bottom:20px}
  .stage-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .stage-count{background:var(--surface2);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--text2)}
  .job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .job-card:active{background:var(--surface2)}
  .job-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
  .job-name{font-size:14px;font-weight:600;line-height:1.3}
  .badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .badge-hot{background:var(--hot-bg);color:var(--hot-text)}
  .badge-warm{background:var(--warm-bg);color:var(--warm-text)}
  .badge-cold{background:var(--cold-bg);color:var(--cold-text)}
  .job-meta{font-size:12px;color:var(--text3);margin-bottom:2px}
  .job-amt{font-size:13px;font-weight:600;color:var(--text);margin-top:6px}
  .job-note-preview{font-size:12px;color:var(--text2);font-style:italic;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .job-due{font-size:11px;color:var(--amber);margin-top:4px;font-weight:500}
  .job-due.overdue{color:var(--red)}
  /* Action list */
  .action-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
  .check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
  .check-box.done{background:var(--green);border-color:var(--green)}
  .action-body{flex:1;min-width:0}
  .action-text{font-size:14px;line-height:1.4}
  .action-text.done{text-decoration:line-through;color:var(--text3)}
  .action-sub{font-size:12px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .priority-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;margin-top:5px;display:inline-block}
  .p-high{background:#fdecea;color:var(--red)}
  .p-med{background:#fff8e1;color:var(--amber)}
  .p-low{background:#e8f5e9;color:var(--green)}
  /* Recap */
  .recap-focus{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
  .recap-focus-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
  .focus-row{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
  .focus-row:last-child{border-bottom:none}
  .focus-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .focus-dot.high{background:var(--red)}.focus-dot.med{background:var(--amber)}.focus-dot.low{background:var(--green)}
  .focus-name{font-size:14px;font-weight:600}
  .focus-detail{font-size:12px;color:var(--text3);margin-top:2px}
  .recap-text-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:ui-monospace,'Courier New',monospace;font-size:12px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-word}
  /* Buttons */
  .btn{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;-webkit-appearance:none}
  .btn:active{background:var(--surface2)}
  .btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
  .btn-primary:active{opacity:.8}
  .btn-block{width:100%;justify-content:center;padding:12px}
  .btn-sm{padding:5px 10px;font-size:12px}
  /* FAB */
  #fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:40;-webkit-appearance:none}
  #fab:active{transform:scale(.94)}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end}
  .modal-sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom)}
  .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 12px}
  .modal-title{font-size:17px;font-weight:600}
  .modal-body{padding:0 16px 16px}
  .modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
  .modal-tab{flex:1;padding:10px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
  .modal-tab.active{color:var(--text);border-bottom-color:var(--text)}
  /* Form */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
  .field input,.field select,.field textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);-webkit-appearance:none;appearance:none;font-family:inherit}
  .field textarea{min-height:80px;resize:vertical;line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--text)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .huddle-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);cursor:pointer}
  .huddle-toggle input{width:18px;height:18px;accent-color:var(--text)}
  .huddle-toggle span{font-size:13px;color:var(--text2)}
  /* Notes */
  .note-item{padding:10px 0;border-bottom:1px solid var(--border)}
  .note-item:last-child{border-bottom:none}
  .note-ts{font-size:11px;color:var(--text3);margin-bottom:4px}
  .note-body{font-size:14px;line-height:1.5}
  .note-flagged{font-size:10px;font-weight:600;color:var(--hot-text);background:var(--hot-bg);padding:1px 6px;border-radius:6px;margin-left:6px}
  /* Misc */
  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}
  .section-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .section-title{font-size:14px;font-weight:600}
  .date-label{font-size:13px;color:var(--text3)}
  .divider{height:1px;background:var(--border);margin:16px 0}
  .checkmark{width:12px;height:12px;stroke:#fff;stroke-width:3;fill:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <h1>NTD <span>Bid Tracker</span></h1>
      <button class="btn btn-sm" id="recap-btn" onclick="showTab('recap')">&#9776; Huddle recap</button>
    </div>
    <div id="nav">
      <button class="nav-btn active" onclick="showTab('pipeline')">Pipeline</button>
      <button class="nav-btn" onclick="showTab('actions')">Today's actions</button>
      <button class="nav-btn" onclick="showTab('recap')">Huddle recap</button>
    </div>
  </div>
  <div id="content"></div>
  <button id="fab" onclick="openJobModal()" aria-label="Add job">+</button>
</div>

<!-- Job modal -->
<div id="job-modal" class="modal-overlay" style="display:none" onclick="closeBg(event,'job-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add job</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" id="delete-btn" onclick="deleteJob()" style="display:none;color:var(--red);border-color:var(--red)">Delete</button>
        <button class="btn btn-sm" onclick="closeModal('job-modal')">Cancel</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" id="mtab-details" onclick="switchTab('details')">Details</button>
        <button class="modal-tab" id="mtab-notes" onclick="switchTab('notes')">Notes log</button>
      </div>
      <div id="mpanel-details">
        <div class="field"><label>Account / facility name</label><input id="f-name" placeholder="e.g. Premier Dental — Garland" autocomplete="off"></div>
        <div class="field"><label>Contact</label><input id="f-contact" placeholder="Name, title" autocomplete="off"></div>
        <div class="field"><label>Bid amount ($)</label><input id="f-amt" type="number" placeholder="0" inputmode="decimal"></div>
        <div class="field-row">
          <div class="field"><label>Stage</label>
            <select id="f-stage">
              <option value="prospect">Prospect</option>
              <option value="quoted">Quoted</option>
              <option value="followup">Follow-up</option>
              <option value="closed">Closed / won</option>
            </select>
          </div>
          <div class="field"><label>Temp</label>
            <select id="f-temp">
              <option value="hot">Hot</option>
              <option value="warm">Warm</option>
              <option value="cold">Cold</option>
            </select>
          </div>
        </div>
        <div class="field"><label>Next follow-up date</label><input id="f-due" type="date"></div>
        <div class="field"><label>Vertical</label><input id="f-vertical" placeholder="e.g. Dental, Automotive, Charter school" autocomplete="off"></div>
        <button class="btn btn-primary btn-block" onclick="saveJob()">Save job</button>
      </div>
      <div id="mpanel-notes" style="display:none">
        <div id="existing-notes" style="margin-bottom:16px"></div>
        <div class="field"><label>Add note</label><textarea id="f-newnote" placeholder="What happened, what's needed, context..."></textarea></div>
        <label class="huddle-toggle" style="margin-bottom:14px">
          <input type="checkbox" id="f-huddle">
          <span>Flag this note for today's huddle recap</span>
        </label>
        <button class="btn btn-primary btn-block" onclick="saveNote()">Save note</button>
      </div>
    </div>
  </div>
</div>

<!-- Action modal -->
<div id="action-modal" class="modal-overlay" style="display:none" onclick="closeBg(event,'action-modal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Add action item</span>
      <button class="btn btn-sm" onclick="closeModal('action-modal')">Cancel</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Action</label><textarea id="a-text" placeholder="What needs to happen..."></textarea></div>
      <div class="field"><label>Priority</label>
        <select id="a-priority">
          <option value="high">High</option>
          <option value="med" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="saveAction()">Add item</button>
    </div>
  </div>
</div>

<script>
var JOBS_KEY='ntd_bids_v1', ACTIONS_KEY='ntd_actions_v1';
var jobs=[], actions=[], editIdx=-1, curTab='pipeline', curModalTab='details';

function load(){
  try{jobs=JSON.parse(localStorage.getItem(JOBS_KEY)||'[]');}catch(e){jobs=[];}
  try{actions=JSON.parse(localStorage.getItem(ACTIONS_KEY)||'[]');}catch(e){actions=[];}
}
function save(){
  localStorage.setItem(JOBS_KEY,JSON.stringify(jobs));
  localStorage.setItem(ACTIONS_KEY,JSON.stringify(actions));
}
load();

var STAGES=['prospect','quoted','followup','closed'];
var STAGE_LABELS={prospect:'Prospect',quoted:'Quoted',followup:'Follow-up',closed:'Closed / won'};

function fmt(n){return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});}
function today(){return new Date().toISOString().slice(0,10);}
function tsNow(){var d=new Date();return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function dateLabel(d){var t=new Date();t.setHours(0,0,0,0);var x=new Date(d+'T00:00:00');var diff=Math.round((x-t)/(1000*60*60*24));if(diff===0)return'Today';if(diff===-1)return'Yesterday';if(diff<0)return Math.abs(diff)+' days overdue';if(diff===1)return'Tomorrow';return d;}
function isOverdue(d){return d&&d<=today();}
function getLastNote(j){if(!j.notes||!j.notes.length)return'';return j.notes[j.notes.length-1].text;}

function showTab(id){
  curTab=id;
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',['pipeline','actions','recap'][i]===id);});
  var c=document.getElementById('content');
  if(id==='pipeline')c.innerHTML=renderPipeline();
  if(id==='actions')c.innerHTML=renderActions();
  if(id==='recap')c.innerHTML=renderRecap();
}

function renderPipeline(){
  var open=jobs.filter(function(j){return j.stage!=='closed';});
  var total=open.reduce(function(s,j){return s+Number(j.amt||0);},0);
  var hot=open.filter(function(j){return j.temp==='hot';}).length;
  var due=jobs.filter(function(j){return isOverdue(j.due)&&j.stage!=='closed';}).length;
  var h='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-label">Open bids</div><div class="stat-val">'+open.length+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Pipeline value</div><div class="stat-val" style="font-size:18px">'+fmt(total)+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Hot leads</div><div class="stat-val">'+hot+'</div></div>';
  h+='<div class="stat-card"><div class="stat-label">Actions due</div><div class="stat-val'+(due?' alert':'')+'">'+due+'</div></div>';
  h+='</div>';
  STAGES.forEach(function(s){
    var cards=jobs.filter(function(j){return j.stage===s;});
    h+='<div class="stage-section">';
    h+='<div class="stage-header">'+STAGE_LABELS[s]+'<span class="stage-count">'+cards.length+'</span></div>';
    if(!cards.length){h+='<div style="font-size:13px;color:var(--text3);padding:8px 0">No jobs</div>';}
    cards.forEach(function(j){
      var ri=jobs.indexOf(j);
      var over=isOverdue(j.due)&&s!=='closed';
      var lastNote=getLastNote(j);
      h+='<div class="job-card" onclick="openJobModal('+ri+')">';
      h+='<div class="job-card-top"><div class="job-name">'+esc(j.name)+'</div><span class="badge badge-'+j.temp+'">'+j.temp+'</span></div>';
      if(j.contact||j.vertical)h+='<div class="job-meta">'+esc(j.contact||'')+(j.contact&&j.vertical?' &middot; ':'')+esc(j.vertical||'')+'</div>';
      if(j.amt)h+='<div class="job-amt">'+fmt(j.amt)+'</div>';
      if(j.due)h+='<div class="job-due'+(over?' overdue':'')+'">'+(over?'&#9888; ':'')+dateLabel(j.due)+'</div>';
      if(lastNote)h+='<div class="job-note-preview">&ldquo;'+esc(lastNote.slice(0,55))+(lastNote.length>55?'&hellip;':'')+'&rdquo;</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div style="height:72px"></div>';
  return h;
}

function renderActions(){
  var d=new Date();
  var ds=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  var jobItems=jobs.filter(function(j){return isOverdue(j.due)&&j.stage!=='closed';}).map(function(j){
    return{id:'job-'+jobs.indexOf(j),text:'Follow up: '+j.name,sub:getLastNote(j).slice(0,70),priority:'high',done:false,fromJob:true,jobIdx:jobs.indexOf(j)};
  });
  var manual=actions.filter(function(a){return a.today===today()||!a.done;});
  var merged=jobItems.filter(function(ji){return!manual.find(function(m){return m.id===ji.id;});}).concat(manual);
  var h='<div class="section-row"><div class="section-title">Today</div><div class="date-label">'+ds+'</div></div>';
  h+='<button class="btn" style="margin-bottom:14px;width:100%;justify-content:center" onclick="document.getElementById(\'action-modal\').style.display=\'flex\'">+ Add action item</button>';
  if(!merged.length){h+='<div class="empty-state">No items today.<br>Jobs with overdue follow-up dates appear here automatically.</div>';return h;}
  merged.forEach(function(a){
    h+='<div class="action-item">';
    h+='<div class="check-box'+(a.done?' done':'')+'" onclick="toggleAction(\''+a.id+'\')">';
    if(a.done)h+='<svg class="checkmark" viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
    h+='</div>';
    h+='<div class="action-body">';
    h+='<div class="action-text'+(a.done?' done':'')+'">'+esc(a.text)+'</div>';
    if(a.sub)h+='<div class="action-sub">'+esc(a.sub)+'</div>';
    h+='<span class="priority-pill p-'+a.priority+'">'+a.priority+'</span>';
    if(a.fromJob)h+=' <button class="btn btn-sm" style="margin-top:6px" onclick="openJobModal('+a.jobIdx+');switchTab(\'notes\')">Notes</button>';
    h+='</div>';
    if(!a.fromJob)h+='<button class="btn btn-sm" onclick="deleteAction(\''+a.id+'\')" style="color:var(--red);border-color:var(--red)">&#10005;</button>';
    h+='</div>';
  });
  h+='<div style="height:72px"></div>';
  return h;
}

function renderRecap(){
  var d=new Date();
  var ds=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',i===2);});

  var huddleNotes=[];
  jobs.forEach(function(j,i){
    if(!j.notes)return;
    j.notes.filter(function(n){return n.huddle&&n.date===today();}).forEach(function(n){
      huddleNotes.push({jobName:j.name,amt:j.amt,note:n.text,jobIdx:i});
    });
  });
  var overdueJobs=jobs.filter(function(j){return isOverdue(j.due)&&j.stage!=='closed';});
  var manualToday=actions.filter(function(a){return a.today===today()&&!a.done;});

  var h='<div class="section-row"><div class="section-title">Huddle recap</div><div class="date-label">'+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div>';
  h+='<button class="btn" style="width:100%;justify-content:center;margin-bottom:16px" onclick="copyRecap()">Copy recap text</button>';

  var hasFocus=huddleNotes.length||overdueJobs.length||manualToday.length;
  if(hasFocus){
    h+='<div class="recap-focus"><div class="recap-focus-header">Today\'s focus</div>';
    huddleNotes.forEach(function(x){
      h+='<div class="focus-row"><div class="focus-dot high"></div><div><div class="focus-name">'+esc(x.jobName)+(x.amt?' <span style="font-weight:400;font-size:12px;color:var(--text3)">'+fmt(x.amt)+'</span>':'')+'</div><div class="focus-detail">'+esc(x.note)+'</div></div></div>';
    });
    overdueJobs.filter(function(j){return!huddleNotes.find(function(h){return h.jobName===j.name;});}).forEach(function(j){
      var ln=getLastNote(j);
      h+='<div class="focus-row"><div class="focus-dot med"></div><div><div class="focus-name">'+esc(j.name)+(j.amt?' <span style="font-weight:400;font-size:12px;color:var(--text3)">'+fmt(j.amt)+'</span>':'')+'</div><div class="focus-detail">Follow-up due'+(ln?' &mdash; '+esc(ln.slice(0,55)):'')+'</div></div></div>';
    });
    manualToday.forEach(function(a){
      h+='<div class="focus-row"><div class="focus-dot '+a.priority+'"></div><div><div class="focus-name">'+esc(a.text)+'</div></div></div>';
    });
    h+='</div>';
  } else {
    h+='<div class="empty-state">No focus items yet.<br>Flag notes on jobs or add action items<br>to build the recap.</div>';
  }

  h+='<div class="divider"></div>';
  h+='<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Recap text (copy &amp; paste)</div>';
  h+='<div class="recap-text-box" id="recap-text-box">'+buildRecapText(ds,huddleNotes,overdueJobs,manualToday)+'</div>';
  h+='<div style="height:72px"></div>';
  return h;
}

function buildRecapText(ds,huddleNotes,overdueJobs,manualToday){
  var open=jobs.filter(function(j){return j.stage!=='closed';});
  var total=open.reduce(function(s,j){return s+Number(j.amt||0);},0);
  var hot=jobs.filter(function(j){return j.temp==='hot'&&j.stage!=='closed';});
  var quoted=jobs.filter(function(j){return j.stage==='quoted';});
  var t='NTD MECHANICAL \u2014 SALES HUDDLE\n'+ds+'\n'+'\u2500'.repeat(40)+'\n\n';
  if(huddleNotes.length){t+='TODAY\'S FOCUS\n';huddleNotes.forEach(function(x){t+='  \u2022 '+x.jobName+(x.amt?' ('+fmt(x.amt)+')':'')+' \u2014 '+x.note+'\n';});t+='\n';}
  if(overdueJobs.length){
    t+='FOLLOW-UPS TO HIT TODAY\n';
    overdueJobs.forEach(function(j){var ln=getLastNote(j);t+='  \u2022 '+j.name+(j.amt?' \u2014 '+fmt(j.amt):'')+(ln?' | '+ln.slice(0,55):'')+'\n';});
    t+='\n';
  }
  if(manualToday.length){t+='OTHER ACTIONS\n';manualToday.forEach(function(a){t+='  \u2022 '+a.text+'\n';});t+='\n';}
  t+='PIPELINE SNAPSHOT\n';
  t+='  Open: '+open.length+'  |  Value: '+fmt(total)+'  |  Hot: '+hot.length+'  |  Quoted: '+quoted.length+'\n';
  t+='\u2500'.repeat(40);
  return esc(t);
}

function copyRecap(){
  var el=document.getElementById('recap-text-box');
  if(!el)return;
  var text=el.innerText||el.textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){alert('Copied to clipboard');});
  } else {
    var ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');alert('Copied to clipboard');}catch(e){}
    document.body.removeChild(ta);
  }
}

function openJobModal(idx){
  editIdx=idx===undefined?-1:idx;
  var j=editIdx>=0?jobs[editIdx]:{};
  document.getElementById('modal-title').textContent=editIdx>=0?j.name:'Add job';
  document.getElementById('delete-btn').style.display=editIdx>=0?'inline-flex':'none';
  document.getElementById('f-name').value=j.name||'';
  document.getElementById('f-contact').value=j.contact||'';
  document.getElementById('f-amt').value=j.amt||'';
  document.getElementById('f-stage').value=j.stage||'prospect';
  document.getElementById('f-temp').value=j.temp||'warm';
  document.getElementById('f-due').value=j.due||'';
  document.getElementById('f-vertical').value=j.vertical||'';
  document.getElementById('f-newnote').value='';
  document.getElementById('f-huddle').checked=false;
  switchTab('details');
  document.getElementById('job-modal').style.display='flex';
}

function switchTab(t){
  curModalTab=t;
  document.getElementById('mpanel-details').style.display=t==='details'?'block':'none';
  document.getElementById('mpanel-notes').style.display=t==='notes'?'block':'none';
  document.getElementById('mtab-details').classList.toggle('active',t==='details');
  document.getElementById('mtab-notes').classList.toggle('active',t==='notes');
  if(t==='notes')renderNotes();
}

function renderNotes(){
  var j=editIdx>=0?jobs[editIdx]:null;
  var notes=j&&j.notes?j.notes:[];
  var el=document.getElementById('existing-notes');
  if(!notes.length){el.innerHTML='<div style="font-size:13px;color:var(--text3);padding:8px 0">No notes yet.</div>';return;}
  var h='';
  var rev=[].concat(notes).reverse();
  rev.forEach(function(n){
    h+='<div class="note-item">';
    h+='<div class="note-ts">'+n.ts+(n.huddle?'<span class="note-flagged">huddle</span>':'')+'</div>';
    h+='<div class="note-body">'+esc(n.text)+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

function saveJob(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){alert('Account name is required');return;}
  var j=editIdx>=0?JSON.parse(JSON.stringify(jobs[editIdx])):{notes:[]};
  j.name=name;
  j.contact=document.getElementById('f-contact').value.trim();
  j.amt=document.getElementById('f-amt').value;
  j.stage=document.getElementById('f-stage').value;
  j.temp=document.getElementById('f-temp').value;
  j.due=document.getElementById('f-due').value;
  j.vertical=document.getElementById('f-vertical').value.trim();
  if(!j.notes)j.notes=[];
  if(editIdx>=0)jobs[editIdx]=j;else jobs.push(j);
  save();closeModal('job-modal');showTab(curTab);
}

function saveNote(){
  if(editIdx<0)return;
  var text=document.getElementById('f-newnote').value.trim();
  if(!text){alert('Enter a note first');return;}
  if(!jobs[editIdx].notes)jobs[editIdx].notes=[];
  jobs[editIdx].notes.push({text:text,ts:tsNow(),date:today(),huddle:document.getElementById('f-huddle').checked});
  save();
  document.getElementById('f-newnote').value='';
  document.getElementById('f-huddle').checked=false;
  renderNotes();
}

function deleteJob(){
  if(editIdx<0)return;
  if(!confirm('Delete '+jobs[editIdx].name+'?'))return;
  jobs.splice(editIdx,1);save();closeModal('job-modal');showTab(curTab);
}

function toggleAction(id){
  var a=actions.find(function(x){return x.id===id;});
  if(a){a.done=!a.done;a.today=today();}
  save();showTab('actions');
}

function deleteAction(id){
  actions=actions.filter(function(a){return a.id!==id;});
  save();showTab('actions');
}

function saveAction(){
  var text=document.getElementById('a-text').value.trim();
  if(!text){alert('Enter an action item');return;}
  var p=document.getElementById('a-priority').value;
  actions.push({id:'man-'+Date.now(),text:text,priority:p,done:false,today:today()});
  save();closeModal('action-modal');showTab('actions');
}

function closeModal(id){document.getElementById(id).style.display='none';}
function closeBg(e,id){if(e.target===document.getElementById(id))closeModal(id);}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

showTab('pipeline');

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.update();
      reg.addEventListener('updatefound', function(){
        var newSW = reg.installing;
        newSW.addEventListener('statechange', function(){
          if(newSW.state === 'installed' && navigator.serviceWorker.controller){
            if(confirm('Update available. Reload now?')) newSW.postMessage('skipWaiting');
          }
        });
      });
      if(reg.waiting) reg.waiting.postMessage('skipWaiting');
    });
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(!refreshing){ refreshing = true; window.location.reload(); }
    });
  });
}
</script>
</body>
